# .github/workflows/ci.yml
# Fast build + test pipeline for every PR and push to main
# This is the primary quality gate — keeps main green

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (ROS 2 Jazzy)
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            python3 \
            python3-pip \
            python3-rosdep \
            build-essential \
            libopencv-dev \
            python3-opencv \
            python3-pyqt5 \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-jazzy-behaviortree-cpp-v3 \
            ros-jazzy-ament-cmake-gtest \
            ros-jazzy-ament-lint-auto \
            ros-jazzy-ament-cmake-cppcheck \
            ros-jazzy-ament-cmake-cpplint \
            ros-jazzy-launch-testing \
            ros-jazzy-launch-testing-ament-cmake
            python3 -m pip install --break-system-packages casadi
          rosdep update --rosdistro=jazzy
          rosdep install --from-paths . --ignore-src -r -y --rosdistro=jazzy

      - name: Build
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=Release
        shell: bash

